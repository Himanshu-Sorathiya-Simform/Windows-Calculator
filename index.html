<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Best Calculator, haha" />

		<title>Calculator</title>

		<link
			rel="icon"
			type="image/x-icon"
			href="assets/icons/calculator-light.svg" />

		<link
			rel="stylesheet"
			href="css/style.css" />
	</head>

	<body>
		<div class="container">
			<div class="calculator">
				<main class="calculator__main">
					<header class="calculator__header">
						<button
							title="menu"
							class="calculator__menu">
							<svg class="icon__medium">
								<use
									href="assets/icons/ui_icons_sprite.svg#hamburger"></use>
							</svg>
						</button>

						<h1 class="calculator__heading">Scientific</h1>

						<button
							title="history"
							class="btn--history">
							<svg class="icon__medium btn--history">
								<use
									href="./assets/icons/ui_icons_sprite.svg#history"></use>
							</svg>
						</button>
					</header>

					<div class="calculator__display">
						<div class="calculator__error">Error</div>

						<div class="calculator__preview">Preview</div>

						<input
							id="query"
							type="text"
							placeholder="0"
							class="calculator__input" />
					</div>

					<!-- <div class="calculator__memory">
						<button
							class="calculator__memory-btn calculator__memory-btn--disabled">
							MC
						</button>

						<button
							class="calculator__memory-btn calculator__memory-btn--disabled">
							MR
						</button>

						<button class="calculator__memory-btn">M+</button>

						<button class="calculator__memory-btn">M-</button>

						<button class="calculator__memory-btn">MS</button>
					</div> -->

					<div class="calculator__dropdown-container">
						<button class="calculator__dropdown">
							<span>Trigonometry</span>

							<svg class="icon__small">
								<use
									href="assets/icons/ui_icons_sprite.svg#chevron-down"></use>
							</svg>
						</button>

						<button class="calculator__dropdown">
							<span>Function</span>

							<svg class="icon__small">
								<use
									href="assets/icons/ui_icons_sprite.svg#chevron-down"></use>
							</svg>
						</button>
					</div>

					<div class="calculator__keypad">
						<button
							data-key="trigonometry_inverse"
							class="calculator__key calculator__key--function">
							2<sup>nd</sup>
						</button>

						<button
							data-key="pi"
							class="calculator__key calculator__key--function">
							&pi;
						</button>

						<button
							data-key="euler"
							class="calculator__key calculator__key--function">
							e
						</button>

						<button
							data-key="clear"
							class="calculator__key calculator__key--function">
							C
						</button>

						<button
							title="backspace"
							data-key="backspace"
							class="calculator__key calculator__key--function">
							<svg class="icon__medium">
								<use
									href="./assets/icons/ui_icons_sprite.svg#backspace"></use>
							</svg>
						</button>

						<button
							data-key="square"
							class="calculator__key calculator__key--function">
							x²
						</button>

						<button
							data-key="reciprocal"
							class="calculator__key calculator__key--function">
							1/x
						</button>

						<button
							data-key="ceiling"
							class="calculator__key calculator__key--function">
							⌈x⌉
						</button>

						<button
							data-key="exponent"
							class="calculator__key calculator__key--function">
							exp
						</button>

						<button
							data-key="modulo"
							class="calculator__key calculator__key--function">
							mod
						</button>

						<button
							data-key="root"
							class="calculator__key calculator__key--function">
							√x
						</button>

						<button
							data-key="left_parenthesis"
							class="calculator__key calculator__key--function">
							(
						</button>

						<button
							data-key="right_parenthesis"
							class="calculator__key calculator__key--function">
							)
						</button>

						<button
							data-key="factorial"
							class="calculator__key calculator__key--function">
							x!
						</button>

						<button
							data-key="divide"
							class="calculator__key calculator__key--operator">
							&divide;
						</button>

						<button
							data-key="power"
							class="calculator__key calculator__key--function">
							xʸ
						</button>

						<button
							data-key="seven"
							class="calculator__key calculator__key--number">
							7
						</button>

						<button
							data-key="eight"
							class="calculator__key calculator__key--number">
							8
						</button>

						<button
							data-key="nine"
							class="calculator__key calculator__key--number">
							9
						</button>

						<button
							data-key="multiply"
							class="calculator__key calculator__key--operator">
							&times;
						</button>

						<button
							data-key="ten_power"
							class="calculator__key calculator__key--function">
							10ˣ
						</button>

						<button
							data-key="four"
							class="calculator__key calculator__key--number">
							4
						</button>

						<button
							data-key="five"
							class="calculator__key calculator__key--number">
							5
						</button>

						<button
							data-key="six"
							class="calculator__key calculator__key--number">
							6
						</button>

						<button
							data-key="minus"
							class="calculator__key calculator__key--operator">
							&minus;
						</button>

						<button
							data-key="logarithm"
							class="calculator__key calculator__key--function">
							log
						</button>

						<button
							data-key="one"
							class="calculator__key calculator__key--number">
							1
						</button>

						<button
							data-key="two"
							class="calculator__key calculator__key--number">
							2
						</button>

						<button
							data-key="three"
							class="calculator__key calculator__key--number">
							3
						</button>

						<button
							data-key="addition"
							class="calculator__key calculator__key--operator">
							&plus;
						</button>

						<button
							data-key="natural_log"
							class="calculator__key calculator__key--function">
							ln
						</button>

						<button
							data-key="sign_change"
							class="calculator__key calculator__key--number">
							±
						</button>

						<button
							data-key="zero"
							class="calculator__key calculator__key--number">
							0
						</button>

						<button
							data-key="decimal"
							class="calculator__key calculator__key--number">
							.
						</button>

						<button
							data-key="equals"
							class="button--accent calculator__key calculator__key--accent calculator__key--operator">
							&equals;
						</button>
					</div>
				</main>

				<aside class="calculator__sidebar">
					<nav class="calculator__navbar">
						<button
							class="calculator__nav-button calculator__nav-button--active">
							History
						</button>

						<button class="calculator__nav-button">Memory</button>
					</nav>

					<div class="calculator__board">
						<p>Theres no History yet</p>
					</div>
				</aside>
			</div>
		</div>

		<script
			defer
			src="main.js"></script>
	</body>
</html>
